<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz PRO</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
  <h2>Quiz</h2>
  <input id="name" placeholder="Seu nome">
  <button onclick="start()">Começar</button>

  <div class="progress"><div id="bar" class="bar"></div></div>

  <h2 id="question"></h2>
  <div id="answers"></div>

  <h3>Ranking</h3>
  <div id="ranking"></div>
  <button onclick="loadRanking()">Atualizar Ranking</button>
</div>

<script src="/static/script.js"></script>

</body>
</html>
